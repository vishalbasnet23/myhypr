# Decoration Settings — Vibrant Theme (no wallust)
# Vibrant Palette
$blue     = rgba(2979ffee)
$lavender = rgba(8e5cffee)
$sapphire = rgba(00bcd4ee)
$sky      = rgba(00e5ffee)
$teal     = rgba(00d4a3ee)
$green    = rgba(00e676ee)
$yellow   = rgba(ffd600ee)
$peach    = rgba(ff9100ee)
$pink     = rgba(ff4081ee)
$mauve    = rgba(d500f9ee)
$flamingo = rgba(ff6e6eee)
$red      = rgba(ff3d00ee)
$surface0 = rgba(2c2f4855)
$surface1 = rgba(3a3e5c55)
$overlay0 = rgba(62689a88)

general {
  border_size = 1
  gaps_in = 4
  gaps_out = 6
  col.active_border   = $teal $teal 45deg
  col.inactive_border = $surface0
}

decoration {
  rounding = 4
  active_opacity   = 1.0
  inactive_opacity = 0.7
  fullscreen_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.1
  dim_special  = 0.8

  shadow {
    enabled = true
    range        = 3
    render_power = 2
    color          = $teal
    color_inactive = $surface0
  }

  blur {
    enabled          = true
    size             = 5
    passes           = 2
    ignore_opacity   = true
    new_optimizations = true
    special  = true
    popups   = true
  }
}

group {
  col.border_active   = $teal $sky 45deg
  col.border_inactive = $surface1

  groupbar {
    col.active   = $blue
    col.inactive = $surface0
  }
}

